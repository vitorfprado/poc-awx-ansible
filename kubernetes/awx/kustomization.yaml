apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Tudo e instalado no namespace awx.
namespace: awx

resources:
  # StorageClass da POC.
  - storageclass.yaml
  # AWX Operator (base oficial via Kustomize, ref fixado para reprodutibilidade).
  # Esta base ja cria o Namespace "awx" — por isso nao declaramos um aqui
  # (declarar duplicaria o recurso e o kustomize falha).
  - github.com/ansible/awx-operator/config/default?ref=2.19.1

# Mantem a imagem do operator alinhada ao ref acima.
images:
  - name: quay.io/ansible/awx-operator
    newTag: 2.19.1

# OBS: o Custom Resource do AWX (awx.yaml) NAO entra aqui de proposito.
# Ele e aplicado em um segundo passo, depois que o CRD/operator estiverem
# prontos, evitando a corrida "CR aplicado antes do CRD existir".
