---
- name: Validar Zabbix Proxy
  hosts: proxy
  become: true
  gather_facts: false
  tasks:
    - name: Servico ativo
      ansible.builtin.command: "systemctl is-active {{ zabbix_proxy_service_name }}"
      register: proxy_svc
      changed_when: false
      failed_when: proxy_svc.stdout != "active"

    - name: Arquivo de configuracao presente
      ansible.builtin.stat:
        path: "{{ zabbix_proxy_config_path }}"
      register: proxy_cfg
      failed_when: not proxy_cfg.stat.exists

- name: Validar Zabbix Agent (Linux)
  hosts: linux
  become: true
  gather_facts: false
  tasks:
    - name: Servico ativo
      ansible.builtin.command: "systemctl is-active {{ zabbix_agent_service_name }}"
      register: linux_svc
      changed_when: false
      failed_when: linux_svc.stdout != "active"

    - name: Arquivo de configuracao presente
      ansible.builtin.stat:
        path: "{{ zabbix_agent_config_path }}"
      register: linux_cfg
      failed_when: not linux_cfg.stat.exists

- name: Validar Zabbix Agent (Windows)
  hosts: windows
  gather_facts: false
  tasks:
    - name: Servico rodando
      ansible.windows.win_service_info:
        name: "{{ zabbix_agent_service_name }}"
      register: win_svc
      failed_when: >-
        (win_svc.services | length == 0) or
        (win_svc.services[0].state != 'running')

    - name: Arquivo de configuracao presente
      ansible.windows.win_stat:
        path: "{{ zabbix_agent_config_path }}"
      register: win_cfg
      failed_when: not win_cfg.stat.exists
