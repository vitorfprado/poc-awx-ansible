[defaults]
inventory = inventories/poc/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent
stdout_callback = yaml
forks = 10
# No AWX, o inventario e as credenciais vem da plataforma (esta config e
# usada principalmente em execucao LOCAL).

[ssh_connection]
pipelining = True
# Conectividade privada via VPN (producao) ou rede interna da VPC (POC).
# SEM bastion/jump host: nao use ProxyCommand nem ansible_ssh_common_args.
