---
# Variaveis do grupo zabbix_agents_windows (Windows Server 2022).

# --- Conexao via WinRM (nao SSH) ---
# A SENHA vem da Machine Credential do AWX (tipo Windows) e NAO e versionada.
# Para execucao local, passe -e 'ansible_password=...' (ou use vault).
ansible_connection: winrm
ansible_port: 5986
ansible_user: Administrator
ansible_winrm_transport: basic
ansible_winrm_server_cert_validation: ignore # cert self-signed criado no user_data
# Windows nao usa o interpretador Python do all.yml; este override evita ruido.
ansible_python_interpreter: ~

# --- Zabbix (igual aos agents Linux; aponta para o PROXY) ---
zabbix_proxy_private_ip: "{{ hostvars[groups['zabbix_proxy'][0]].ansible_host }}"
zabbix_agent_hostname: "{{ inventory_hostname }}"
zabbix_agent_server: "{{ zabbix_proxy_private_ip }}"
zabbix_agent_server_active: "{{ zabbix_proxy_private_ip }}"
zabbix_agent_host_metadata: "poc-zabbix-agent-windows"

# TLS/PSK (herda o flag global; segredos vem do vault).
zabbix_agent_tls_enabled: "{{ zabbix_tls_enabled }}"
zabbix_agent_tls_psk_identity: "{{ vault_zabbix_agent_psk_identity | default('') }}"
zabbix_agent_tls_psk: "{{ vault_zabbix_agent_psk | default('') }}"
