---
# Especifico do grupo linux (Amazon Linux 2023).
# A CHAVE SSH vem da Machine Credential do AWX (NAO versionar).
ansible_connection: ssh
ansible_user: ec2-user
ansible_python_interpreter: /usr/bin/python3

# Pacote / servico / config do Zabbix Agent 2 no Linux.
zabbix_agent_package: zabbix-agent2
zabbix_agent_service_name: zabbix-agent2
zabbix_agent_config_path: /etc/zabbix/zabbix_agent2.conf
