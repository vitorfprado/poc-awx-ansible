---
# Especifico do grupo linux (Amazon Linux 2023).
# A CHAVE SSH vem da Machine Credential do AWX (NAO versionar).
ansible_connection: ssh
ansible_user: ec2-user
ansible_python_interpreter: /usr/bin/python3

# IP do Zabbix Proxy para o qual este grupo de agents reporta.
# Preencher no AWX (group vars do grupo linux) com o IP real do proxy.
zabbix_agent_server: "CHANGE_ME_proxy_ip"
zabbix_agent_server_active: "CHANGE_ME_proxy_ip"

# Pacote / servico / config do Zabbix Agent 2 no Linux.
zabbix_agent_package: zabbix-agent2
zabbix_agent_service_name: zabbix-agent2
zabbix_agent_config_path: /etc/zabbix/zabbix_agent2.conf
