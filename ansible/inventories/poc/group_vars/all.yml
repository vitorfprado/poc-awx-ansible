---
# ============================================================================
# Conexao SSH (sem bastion; conectividade privada via VPN/VPC)
# ============================================================================
# No AWX, o USUARIO e a CHAVE vem da Machine Credential (nao versionar chave).
# Os defaults abaixo servem para execucao LOCAL e como fallback. Se o usuario
# da Machine Credential for o mesmo (ec2-user), nao ha conflito.
ansible_user: "{{ zbx_ssh_user | default('ec2-user') }}"
ansible_port: "{{ zbx_ssh_port | default(22) }}"
ansible_python_interpreter: /usr/bin/python3

# Execucao LOCAL opcional com chave (NAO versionar a chave). Exemplos:
#   ansible-playbook ... --private-key ~/.ssh/poc.pem
#   ansible-playbook ... -e 'ansible_ssh_private_key_file=~/.ssh/poc.pem'
# ansible_ssh_private_key_file: "~/.ssh/poc-awx-zabbix.pem"

# ============================================================================
# Zabbix - parametros comuns
# ============================================================================
zabbix_version: "7.0"

# Endereco do Zabbix Server central. Preencher com o valor real (output do
# Terraform zabbix_server_address) via extra-vars do AWX ou pelo vault.
# NUNCA hardcode em codigo de role.
zabbix_server_address: "{{ vault_zabbix_server_address | default('CHANGE_ME_zabbix_server') }}"
zabbix_server_port: 10051

# TLS/PSK desabilitado por padrao na POC. Habilite definindo true e populando
# as PSK no vault (vault.yml.example).
zabbix_tls_enabled: false
