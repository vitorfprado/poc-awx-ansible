---
# Variaveis comuns a Linux e Windows.

# Versao do Zabbix (controla pacote/MSI/repo). Troque AQUI para mudar de versao.
zabbix_version: "7.0"

# Endereco do Zabbix Proxy ou Server para onde os agents reportam.
# Ex.: IP privado do Zabbix Proxy, ou DNS do NLB do Zabbix Server.
zabbix_server_address: "CHANGE_ME_zabbix_endpoint"
zabbix_server_port: 10051

# Server (passivo) e ServerActive (ativo) dos agents. Por padrao, ambos apontam
# para zabbix_server_address. Sobrescreva se quiser destinos diferentes.
zabbix_agent_server: "{{ zabbix_server_address }}"
zabbix_agent_server_active: "{{ zabbix_server_address }}"
