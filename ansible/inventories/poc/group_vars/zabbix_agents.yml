---
# Variaveis do grupo zabbix_agents (sobrescrevem os defaults da role).

# IP privado do proxy DERIVADO do inventario (sem hardcode): pega o ansible_host
# do primeiro host do grupo zabbix_proxy. Adicionar/trocar o proxy nao exige
# editar os agents.
zabbix_proxy_private_ip: "{{ hostvars[groups['zabbix_proxy'][0]].ansible_host }}"

# Hostname do agent consistente com o nome esperado no Zabbix Server.
zabbix_agent_hostname: "{{ inventory_hostname }}"

# Agents apontam para o PROXY (nao para o Server):
#  - Server        (passivo): proxy faz checks no agent
#  - ServerActive  (ativo):   agent envia dados ao proxy
zabbix_agent_server: "{{ zabbix_proxy_private_ip }}"
zabbix_agent_server_active: "{{ zabbix_proxy_private_ip }}"

# Metadata para autoregistro no Zabbix (opcional).
zabbix_agent_host_metadata: "poc-zabbix-agent"

# TLS/PSK (herda o flag global; segredos vem do vault).
zabbix_agent_tls_enabled: "{{ zabbix_tls_enabled }}"
zabbix_agent_tls_psk_identity: "{{ vault_zabbix_agent_psk_identity | default('') }}"
zabbix_agent_tls_psk: "{{ vault_zabbix_agent_psk | default('') }}"
