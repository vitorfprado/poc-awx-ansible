---
# Variaveis do grupo zabbix_proxy (sobrescrevem os defaults da role).

# Hostname do proxy DEVE ser consistente com o nome cadastrado no Zabbix Server.
zabbix_proxy_hostname: "{{ inventory_hostname }}"

# 0 = active (proxy conecta no Server) | 1 = passive (Server conecta no proxy)
zabbix_proxy_mode: 0

# Banco local do proxy: SQLite para a POC (sem servidor de BD externo).
zabbix_proxy_database: sqlite3

# TLS/PSK (herda o flag global; segredos vem do vault).
zabbix_proxy_tls_enabled: "{{ zabbix_tls_enabled }}"
zabbix_proxy_tls_psk_identity: "{{ vault_zabbix_proxy_psk_identity | default('') }}"
zabbix_proxy_tls_psk: "{{ vault_zabbix_proxy_psk | default('') }}"
