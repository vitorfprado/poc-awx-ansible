---
- name: Validar que o IP do proxy esta definido
  ansible.builtin.assert:
    that:
      - zabbix_proxy_private_ip is defined
      - zabbix_proxy_private_ip | length > 0
    fail_msg: >-
      zabbix_proxy_private_ip esta vazio. Garanta que o grupo zabbix_proxy tem
      um host com ansible_host preenchido no inventario.

- name: Instalar o repositorio oficial do Zabbix
  ansible.builtin.dnf:
    name: "{{ zabbix_repo_rpm_url }}"
    state: present
    disable_gpg_check: true
  register: zabbix_repo_install

- name: Instalar o pacote do Zabbix Agent 2 ({{ zabbix_agent_package }})
  ansible.builtin.dnf:
    name: "{{ zabbix_agent_package }}"
    state: present
    update_cache: true

- name: Garantir diretorios necessarios
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: zabbix
    group: zabbix
    mode: "0750"
  loop:
    - "{{ zabbix_agent_include_dir }}"
    - /var/log/zabbix

- name: Provisionar a PSK do agent (quando TLS habilitado)
  ansible.builtin.copy:
    content: "{{ zabbix_agent_tls_psk }}"
    dest: "{{ zabbix_agent_tls_psk_file }}"
    owner: zabbix
    group: zabbix
    mode: "0600"
  when: zabbix_agent_tls_enabled | bool
  no_log: true
  notify: restart zabbix agent

- name: Renderizar /etc/zabbix/zabbix_agent2.conf
  ansible.builtin.template:
    src: zabbix_agent2.conf.j2
    dest: "{{ zabbix_agent_config_path }}"
    owner: root
    group: zabbix
    mode: "0640"
  notify: restart zabbix agent

- name: Habilitar e iniciar o servico do Zabbix Agent 2
  ansible.builtin.systemd:
    name: "{{ zabbix_agent_service }}"
    enabled: true
    state: started

- name: Aplicar mudancas pendentes (handlers)
  ansible.builtin.meta: flush_handlers

- name: Validar que o servico esta ativo
  ansible.builtin.command: "systemctl is-active {{ zabbix_agent_service }}"
  register: zabbix_agent_active
  changed_when: false
  failed_when: zabbix_agent_active.stdout != "active"
