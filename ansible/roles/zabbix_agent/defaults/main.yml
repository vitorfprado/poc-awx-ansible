---
# ============================================================================
# Defaults da role zabbix_agent (Zabbix Agent 2). Sem dados sensiveis aqui.
# ============================================================================

zabbix_version: "7.0"

# Repositorio oficial do Zabbix para Amazon Linux 2023 (mesmo das EC2s).
zabbix_repo_rpm_url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/release/amazonlinux/2023/noarch/zabbix-release-latest-{{ zabbix_version }}.amzn2023.noarch.rpm"

# Agent 2 (preferido).
zabbix_agent_package: zabbix-agent2
zabbix_agent_service: zabbix-agent2
zabbix_agent_config_path: /etc/zabbix/zabbix_agent2.conf
zabbix_agent_include_dir: /etc/zabbix/zabbix_agent2.d

# Identidade / conexao
zabbix_agent_hostname: "{{ inventory_hostname }}"
zabbix_agent_listen_port: 10050

# Aponta para o PROXY (IP privado derivado do inventario via group_vars).
zabbix_proxy_private_ip: ""
zabbix_proxy_listen_port: 10051
zabbix_agent_server: "{{ zabbix_proxy_private_ip }}"
zabbix_agent_server_active: "{{ zabbix_proxy_private_ip }}"

# Metadata para autoregistro (opcional).
zabbix_agent_host_metadata: "poc-zabbix-agent"

# TLS/PSK (desabilitado por padrao; segredos vem do vault)
zabbix_agent_tls_enabled: false
zabbix_agent_tls_psk_identity: ""
zabbix_agent_tls_psk: ""
zabbix_agent_tls_psk_file: /etc/zabbix/zabbix_agent2.psk
