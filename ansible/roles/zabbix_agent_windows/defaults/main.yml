---
# Defaults da role zabbix_agent_windows (Zabbix Agent 2 em Windows Server 2022).
# zabbix_version, zabbix_agent_server* vem de group_vars/all.yml.
# zabbix_agent_service_name/config_path vem de group_vars/windows.yml.

# Versao COMPLETA (patch) do MSI. Nao ha "latest" para o MSI: confirme o patch
# atual em https://www.zabbix.com/download_agents (linha {{ zabbix_version }} LTS).
zabbix_agent_windows_version: "7.0.6"
zabbix_agent_windows_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/{{ zabbix_version }}/{{ zabbix_agent_windows_version }}/zabbix_agent2-{{ zabbix_agent_windows_version }}-windows-amd64-openssl.msi"
zabbix_agent_windows_msi_dest: 'C:\Windows\Temp\zabbix_agent2.msi'
zabbix_agent_windows_install_dir: 'C:\Program Files\Zabbix Agent 2'

zabbix_agent_hostname: "{{ inventory_hostname }}"
zabbix_agent_listen_port: 10050
zabbix_agent_host_metadata: "poc-zabbix-agent-windows"

# TLS/PSK opcional (off por padrao; segredos vem do vault).
zabbix_agent_tls_enabled: false
zabbix_agent_tls_psk_identity: ""
zabbix_agent_tls_psk: ""
zabbix_agent_tls_psk_file: 'C:\Program Files\Zabbix Agent 2\zabbix_agent2.psk'
