---
# ============================================================================
# Defaults da role zabbix_proxy (precedencia baixa; sobrescrevíveis por
# group_vars/extra-vars). Sem dados sensiveis aqui.
# ============================================================================

zabbix_version: "7.0"

# Repositorio oficial do Zabbix para Amazon Linux 2023 (AMI usada nas EC2s).
# Parametrizado para trocar SO/versao sem mexer nas tasks. Confira o caminho
# atual em https://repo.zabbix.com se a versao mudar.
zabbix_repo_rpm_url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/release/amazonlinux/2023/noarch/zabbix-release-latest-{{ zabbix_version }}.amzn2023.noarch.rpm"

# Pacote e servico (SQLite para a POC: sem BD externo).
zabbix_proxy_package: zabbix-proxy-sqlite3
zabbix_proxy_service: zabbix-proxy
zabbix_proxy_config_path: /etc/zabbix/zabbix_proxy.conf
zabbix_proxy_include_dir: /etc/zabbix/zabbix_proxy.conf.d

# Identidade / conexao
zabbix_proxy_hostname: "{{ inventory_hostname }}"
zabbix_proxy_mode: 0 # 0=active, 1=passive
zabbix_proxy_listen_port: 10051

# Zabbix Server central (alvo do proxy). Sobrescrito por group_vars/all.yml.
zabbix_server_address: "CHANGE_ME_zabbix_server"
zabbix_server_port: 10051

# Banco local (SQLite): DBName e o caminho do arquivo. O proxy cria o schema
# automaticamente na primeira execucao quando o arquivo nao existe.
zabbix_proxy_database: sqlite3
zabbix_proxy_db_path: /var/lib/zabbix/zabbix_proxy.db

# Tuning (enxuto para POC)
zabbix_proxy_cache_size: "32M"
zabbix_proxy_history_cache_size: "16M"
zabbix_proxy_history_index_cache_size: "8M"
zabbix_proxy_timeout: 4
zabbix_proxy_offline_buffer: 1
zabbix_proxy_config_frequency: 3600
zabbix_proxy_data_sender_frequency: 1

# TLS/PSK (desabilitado por padrao; segredos vem do vault)
zabbix_proxy_tls_enabled: false
zabbix_proxy_tls_psk_identity: ""
zabbix_proxy_tls_psk: ""
zabbix_proxy_tls_psk_file: /etc/zabbix/zabbix_proxy.psk
