---
- name: Instalar o repositorio oficial do Zabbix
  ansible.builtin.dnf:
    name: "{{ zabbix_repo_rpm_url }}"
    state: present
    # O proprio RPM de release traz a chave GPG; ele e quem habilita o repo.
    disable_gpg_check: true
  register: zabbix_repo_install

- name: Instalar o pacote do Zabbix Proxy ({{ zabbix_proxy_package }})
  ansible.builtin.dnf:
    name: "{{ zabbix_proxy_package }}"
    state: present
    update_cache: true

- name: Garantir diretorios necessarios
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: zabbix
    group: zabbix
    mode: "0750"
  loop:
    - "{{ zabbix_proxy_include_dir }}"
    - "{{ zabbix_proxy_db_path | dirname }}"
    - /var/log/zabbix

- name: Provisionar a PSK do proxy (quando TLS habilitado)
  ansible.builtin.copy:
    content: "{{ zabbix_proxy_tls_psk }}"
    dest: "{{ zabbix_proxy_tls_psk_file }}"
    owner: zabbix
    group: zabbix
    mode: "0600"
  when: zabbix_proxy_tls_enabled | bool
  no_log: true
  notify: restart zabbix proxy

- name: Renderizar /etc/zabbix/zabbix_proxy.conf
  ansible.builtin.template:
    src: zabbix_proxy.conf.j2
    dest: "{{ zabbix_proxy_config_path }}"
    owner: root
    group: zabbix
    mode: "0640"
  notify: restart zabbix proxy

- name: Habilitar e iniciar o servico do Zabbix Proxy
  ansible.builtin.systemd:
    name: "{{ zabbix_proxy_service }}"
    enabled: true
    state: started

# Aplica o restart pendente (se a config mudou) antes da validacao.
- name: Aplicar mudancas pendentes (handlers)
  ansible.builtin.meta: flush_handlers

- name: Validar que o servico esta ativo
  ansible.builtin.command: "systemctl is-active {{ zabbix_proxy_service }}"
  register: zabbix_proxy_active
  changed_when: false
  failed_when: zabbix_proxy_active.stdout != "active"
