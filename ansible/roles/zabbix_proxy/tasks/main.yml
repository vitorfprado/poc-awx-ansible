---
- name: Instalar o repositorio oficial do Zabbix
  ansible.builtin.dnf:
    name: "{{ zabbix_repo_rpm_url }}"
    state: present
    disable_gpg_check: true

- name: Instalar o Zabbix Proxy ({{ zabbix_proxy_package }})
  ansible.builtin.dnf:
    name: "{{ zabbix_proxy_package }}"
    state: present
    update_cache: true

- name: Garantir diretorios necessarios
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: zabbix
    group: zabbix
    mode: "0750"
  loop:
    - "{{ zabbix_proxy_include_dir }}"
    - "{{ zabbix_proxy_db_path | dirname }}"
    - /var/log/zabbix

- name: Provisionar a PSK do proxy (quando TLS habilitado)
  ansible.builtin.copy:
    content: "{{ zabbix_proxy_tls_psk }}"
    dest: "{{ zabbix_proxy_tls_psk_file }}"
    owner: zabbix
    group: zabbix
    mode: "0600"
  when: zabbix_proxy_tls_enabled | bool
  no_log: true
  notify: restart zabbix proxy

- name: Renderizar o zabbix_proxy.conf
  ansible.builtin.template:
    src: zabbix_proxy.conf.j2
    dest: "{{ zabbix_proxy_config_path }}"
    owner: root
    group: zabbix
    mode: "0640"
  notify: restart zabbix proxy

- name: Habilitar o servico
  ansible.builtin.systemd:
    name: "{{ zabbix_proxy_service_name }}"
    enabled: true

- name: Flush handlers antes do start para evitar restart em cima de start
  ansible.builtin.meta: flush_handlers

- name: Garantir que o servico esta rodando
  ansible.builtin.systemd:
    name: "{{ zabbix_proxy_service_name }}"
    state: started
