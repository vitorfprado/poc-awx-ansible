name: Terraform - awx-zabbix-poc

# Execucao APENAS manual/sob demanda. Nao ha trigger de push/PR, portanto
# nenhum apply ou destroy pode ocorrer automaticamente por push.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Acao do Terraform a executar"
        type: choice
        required: true
        default: plan
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: 'Confirmacao de destroy: digite exatamente "destroy" (obrigatorio quando action=destroy)'
        type: string
        required: false
        default: ""

# Evita execucoes concorrentes sobre o mesmo state. Nao cancela em andamento
# (cancelar uma operacao de state pode deixar lock/registro inconsistente).
concurrency:
  group: terraform-awx-zabbix-poc
  cancel-in-progress: false

# id-token: write e necessario para o fluxo OIDC com a AWS (sem access keys).
permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_VERSION: "1.14.4"
  WORKDIR: iac/awx-zabbix-poc
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  # Default do bucket de state; sobrescreva com a variable TF_STATE_BUCKET se mudar.
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'tfstate-awx-zabbix-poc-650687537445' }}

jobs:
  # ===========================================================================
  # Stage 1: Terraform (infra AWS)
  # ===========================================================================
  terraform:
    name: "Stage 1 - Terraform ${{ inputs.action }}"
    runs-on: ubuntu-latest

    # Disponibiliza o nome do cluster para o Stage 2.
    outputs:
      cluster_name: ${{ steps.tfout.outputs.cluster_name }}

    defaults:
      run:
        shell: bash
        working-directory: iac/awx-zabbix-poc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Falha cedo se for destroy sem a confirmacao correta.
      - name: Validar confirmacao de destroy
        if: ${{ inputs.action == 'destroy' }}
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "destroy" ]; then
            echo "::error::action=destroy exige confirm_destroy == 'destroy'. Abortando."
            exit 1
          fi
          echo "Confirmacao de destroy aceita."

      # Autenticacao via OIDC: o GitHub emite um token de identidade que a AWS
      # troca por credenciais temporarias ao assumir a role. Sem access keys.
      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          role-session-name: gha-terraform-awx-zabbix-poc
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt -check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -no-color \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=awx-zabbix-poc/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Terraform validate
        run: terraform validate -no-color

      # Monta um ci.auto.tfvars apenas com as variaveis efetivamente definidas
      # como repository variables, preservando os defaults (e o null) das demais.
      - name: Gerar ci.auto.tfvars a partir de repository variables
        env:
          V_AWS_REGION: ${{ env.AWS_REGION }}
          V_SSH_KEY_NAME: ${{ vars.SSH_KEY_NAME }}
          V_ZBX_ADDR: ${{ vars.ZABBIX_SERVER_ADDRESS }}
          V_ZBX_CIDR: ${{ vars.ZABBIX_SERVER_CIDR }}
          V_AGENT_COUNT: ${{ vars.AGENT_COUNT }}
          # Default: libera o usuario da POC ja no primeiro apply (kubectl local),
          # sem precisar cadastrar a variable. Sobrescreva com a repo variable
          # EKS_ADMIN_PRINCIPAL_ARNS (lista separada por virgula) para outros ARNs.
          V_EKS_ADMINS: ${{ vars.EKS_ADMIN_PRINCIPAL_ARNS || 'arn:aws:iam::650687537445:user/vitor.prado' }}
        run: |
          f=ci.auto.tfvars
          : > "$f"
          [ -n "$V_AWS_REGION" ]   && printf 'aws_region = "%s"\n'            "$V_AWS_REGION"   >> "$f"
          [ -n "$V_SSH_KEY_NAME" ] && printf 'ssh_key_name = "%s"\n'          "$V_SSH_KEY_NAME" >> "$f"
          [ -n "$V_ZBX_ADDR" ]     && printf 'zabbix_server_address = "%s"\n' "$V_ZBX_ADDR"     >> "$f"
          [ -n "$V_ZBX_CIDR" ]     && printf 'zabbix_server_cidr = "%s"\n'    "$V_ZBX_CIDR"     >> "$f"
          [ -n "$V_AGENT_COUNT" ]  && printf 'agent_count = %s\n'             "$V_AGENT_COUNT"  >> "$f"
          # Lista separada por virgula -> ["arn1","arn2"]
          if [ -n "$V_EKS_ADMINS" ]; then
            arns=$(echo "$V_EKS_ADMINS" | tr ',' '\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//; /^$/d; s/.*/"&"/' | paste -sd, -)
            printf 'eks_admin_principal_arns = [%s]\n' "$arns" >> "$f"
          fi
          echo "----- ci.auto.tfvars -----"
          cat "$f"

      - name: "Banner: DESTRUICAO de infraestrutura"
        if: ${{ inputs.action == 'destroy' }}
        run: |
          echo "::warning title=DESTROY::Este job vai DESTRUIR a infra da POC awx-zabbix-poc"
          echo "############################################################"
          echo "#                                                          #"
          echo "#   ATENCAO: DESTRUICAO DE INFRAESTRUTURA (action=destroy)  #"
          echo "#                                                          #"
          echo "#   Serao REMOVIDOS: VPC, EKS (cluster + nodes),           #"
          echo "#   EC2 do Zabbix Proxy e EC2s dos Zabbix Agents,          #"
          echo "#   alem de SGs, IAM e demais recursos da POC.             #"
          echo "#                                                          #"
          echo "############################################################"

      # Sempre gera um plano. Para destroy, gera um plano de destruicao.
      - name: Terraform plan
        run: |
          if [ "${{ inputs.action }}" = "destroy" ]; then
            echo "Gerando plano de DESTRUICAO (-destroy)..."
            terraform plan -no-color -destroy -out=tfplan
          else
            terraform plan -no-color -out=tfplan
          fi

      # apply aplica o plano salvo (tfplan) gerado no passo anterior.
      - name: Terraform apply (action=apply)
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -no-color -auto-approve tfplan

      # Captura o nome do cluster para o Stage 2.
      - name: Capturar outputs do Terraform (action=apply)
        id: tfout
        if: ${{ inputs.action == 'apply' }}
        run: echo "cluster_name=$(terraform output -raw eks_cluster_name)" >> "$GITHUB_OUTPUT"

      # Antes de destruir o cluster, remove o AWX para que o EBS CSI apague o
      # volume do PostgreSQL (evita volume EBS orfao). Best-effort.
      - name: Setup kubectl (pre-destroy)
        if: ${{ inputs.action == 'destroy' }}
        uses: azure/setup-kubectl@v4

      - name: Pre-destroy - remover AWX do cluster (best-effort)
        if: ${{ inputs.action == 'destroy' }}
        continue-on-error: true
        run: |
          CLUSTER="$(terraform output -raw eks_cluster_name 2>/dev/null || true)"
          if [ -z "$CLUSTER" ]; then
            echo "Sem cluster no state; nada a limpar."
            exit 0
          fi
          aws eks update-kubeconfig --name "$CLUSTER" --region "${{ env.AWS_REGION }}" || exit 0
          echo "Removendo namespace zabbix (libera o NLB interno antes do destroy)..."
          kubectl delete namespace zabbix --wait=true --timeout=300s --ignore-not-found || true
          echo "Removendo namespace awx (libera PVC/EBS antes do destroy)..."
          kubectl delete namespace awx --wait=true --timeout=300s --ignore-not-found || true

      # Destroy resiliente: tenta varias vezes, limpando entre as tentativas os
      # recursos que a AWS cria sozinha (fora do Terraform) e que travam a
      # delecao da VPC/subnets (DependencyViolation): NLBs do k8s, ENIs orfas do
      # VPC CNI, o SG eks-cluster-sg-* e volumes EBS orfaos. Esses orfaos so
      # surgem NO MEIO do destroy (apos os nodes terminarem), por isso o loop.
      - name: Terraform destroy (action=destroy)
        if: ${{ inputs.action == 'destroy' }}
        run: |
          set +e
          echo "::warning title=DESTROY::Aplicando a DESTRUICAO..."

          # Capturados uma vez (o state ainda os tem) para a limpeza de orfaos.
          VPC="$(terraform output -raw vpc_id 2>/dev/null || true)"
          CLUSTER="$(terraform output -raw eks_cluster_name 2>/dev/null || true)"

          cleanup_orphans() {
            [ -z "$VPC" ] && return 0
            echo "::group::Limpando orfaos da VPC $VPC"
            # LoadBalancers (NLB/ELB) criados pelo k8s que ainda seguram subnets.
            for lb in $(aws elbv2 describe-load-balancers \
                --query "LoadBalancers[?VpcId=='$VPC'].LoadBalancerArn" --output text 2>/dev/null); do
              echo "  LB $lb"; aws elbv2 delete-load-balancer --load-balancer-arn "$lb" || true
            done
            # ENIs orfas do VPC CNI (status available).
            for eni in $(aws ec2 describe-network-interfaces \
                --filters "Name=vpc-id,Values=$VPC" "Name=status,Values=available" \
                --query "NetworkInterfaces[].NetworkInterfaceId" --output text); do
              echo "  ENI $eni"; aws ec2 delete-network-interface --network-interface-id "$eni" || true
            done
            # SG que o EKS cria sozinho (eks-cluster-sg-*). Nao toca nos SGs do TF.
            for sg in $(aws ec2 describe-security-groups \
                --filters "Name=vpc-id,Values=$VPC" "Name=group-name,Values=eks-cluster-sg-*" \
                --query "SecurityGroups[].GroupId" --output text); do
              echo "  SG $sg"; aws ec2 delete-security-group --group-id "$sg" || true
            done
            # Volumes EBS orfaos do cluster (PVC do PostgreSQL).
            if [ -n "$CLUSTER" ]; then
              for vol in $(aws ec2 describe-volumes \
                  --filters "Name=status,Values=available" "Name=tag:kubernetes.io/cluster/$CLUSTER,Values=owned" \
                  --query "Volumes[].VolumeId" --output text); do
                echo "  Vol $vol"; aws ec2 delete-volume --volume-id "$vol" || true
              done
            fi
            echo "::endgroup::"
          }

          rc=1
          for attempt in 1 2 3 4 5; do
            echo "::group::Destroy - tentativa $attempt/5"
            terraform destroy -no-color -auto-approve
            rc=$?
            echo "::endgroup::"
            if [ $rc -eq 0 ]; then
              echo "Destroy concluido na tentativa $attempt."
              break
            fi
            echo "::warning::Destroy falhou (tentativa $attempt/5). Limpando orfaos e repetindo..."
            cleanup_orphans
            sleep 20
          done
          exit $rc

      # Exibe outputs uteis para integracao com AWX/Ansible apos o apply.
      - name: Exibir outputs (action=apply)
        if: ${{ inputs.action == 'apply' }}
        run: |
          {
            echo "## Outputs - awx-zabbix-poc"
            echo ""
            echo "- **EKS cluster:** \`$(terraform output -raw eks_cluster_name)\`"
            echo "- **Atualizar kubeconfig:** \`$(terraform output -raw kubeconfig_command)\`"
            echo "- **Zabbix Proxy (IP privado):** \`$(terraform output -raw zabbix_proxy_private_ip)\`"
            echo ""
            echo "**Zabbix Agents (IPs privados):**"
            echo ""
            echo '```json'
            terraform output -json zabbix_agent_private_ips
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Stage 2: Bootstrap Kubernetes + AWX Operator (somente em action=apply)
  # ===========================================================================
  bootstrap_awx:
    name: "Stage 2 - Bootstrap (addons + AWX)"
    needs: terraform
    if: ${{ inputs.action == 'apply' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          role-session-name: gha-bootstrap-awx
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Atualizar kubeconfig
        run: aws eks update-kubeconfig --name "${{ needs.terraform.outputs.cluster_name }}" --region "${{ env.AWS_REGION }}"

      # Addon de cluster: metrics-server (kubectl top / HPA). Instalado aqui (e
      # nao no Terraform) para nao acoplar o Terraform a API do cluster.
      - name: Instalar metrics-server (addon)
        run: |
          set -e
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.7.2/components.yaml
          # EKS: cert de serving do kubelet nao e confiavel por padrao.
          kubectl -n kube-system patch deployment metrics-server --type=json \
            -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--kubelet-insecure-tls"}]'
          set +e
          kubectl -n kube-system rollout status deployment/metrics-server --timeout=300s
          if [ $? -ne 0 ]; then
            echo "::warning::metrics-server nao ficou Ready (a POC segue mesmo assim)."
            kubectl -n kube-system get pods -l k8s-app=metrics-server -o wide || true
          fi

      # Passo 1: operator + namespace + StorageClass.
      - name: Instalar AWX Operator (kustomize)
        run: |
          set +e
          kubectl apply -k kubernetes/awx
          echo "Aguardando o AWX Operator ficar pronto..."
          kubectl -n awx rollout status deployment/awx-operator-controller-manager --timeout=600s
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::group::Diagnostico (operator)"
            kubectl get nodes -o wide
            kubectl -n awx get pods -o wide
            kubectl -n awx describe pod -l control-plane=controller-manager
            kubectl -n awx get events --sort-by=.lastTimestamp | tail -40
            echo "::endgroup::"
          fi
          exit $rc

      # Passo 2: Custom Resource do AWX (depois do CRD/operator prontos).
      - name: Criar instancia AWX e aguardar os pods
        run: |
          set +e
          kubectl apply -f kubernetes/awx/awx.yaml
          echo "Aguardando o operator criar o deployment awx-web..."
          for i in $(seq 1 60); do
            if kubectl -n awx get deploy awx-web >/dev/null 2>&1; then
              echo "awx-web criado."
              break
            fi
            echo "  ...ainda nao ($i/60)"
            sleep 10
          done
          kubectl -n awx rollout status deployment/awx-web  --timeout=900s && \
          kubectl -n awx rollout status deployment/awx-task --timeout=900s
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::group::Diagnostico (AWX)"
            kubectl -n awx get pods -o wide
            kubectl -n awx get pvc
            kubectl -n awx describe pods
            kubectl -n awx get events --sort-by=.lastTimestamp | tail -50
            echo "::endgroup::"
          fi
          exit $rc

      - name: Estado do AWX e comandos de acesso
        if: ${{ always() }}
        run: |
          {
            echo "## AWX (Stage 2)"
            echo ""
            echo "### Pods (\`kubectl get pods -n awx\`)"
            echo '```'
            kubectl get pods -n awx || true
            echo '```'
            echo "### Services (\`kubectl get svc -n awx\`)"
            echo '```'
            kubectl get svc -n awx || true
            echo '```'
            echo "### Acesso ao AWX"
            echo "Senha do admin:"
            echo '```bash'
            echo 'kubectl -n awx get secret awx-admin-password -o jsonpath="{.data.password}" | base64 -d; echo'
            echo '```'
            echo "Port-forward (acesso local):"
            echo '```bash'
            echo 'kubectl -n awx port-forward svc/awx-service 8080:80'
            echo '```'
            echo "Depois acesse <http://localhost:8080> (usuario: \`admin\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      # Zabbix Server no cluster (server + web + postgres). Trapper (10051)
      # exposto por NLB interno para o Zabbix Proxy (EC2) alcancar.
      - name: Instalar Zabbix Server
        run: |
          set +e
          kubectl apply -f kubernetes/zabbix-server/namespace.yaml
          # Senha do banco: gerada UMA vez (idempotente; nao versionada).
          kubectl -n zabbix get secret zabbix-db >/dev/null 2>&1 || \
            kubectl -n zabbix create secret generic zabbix-db \
              --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)"
          kubectl apply -k kubernetes/zabbix-server
          kubectl -n zabbix rollout status deployment/zabbix-postgres --timeout=300s && \
          kubectl -n zabbix rollout status deployment/zabbix-server  --timeout=600s && \
          kubectl -n zabbix rollout status deployment/zabbix-web     --timeout=600s
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::group::Diagnostico (Zabbix)"
            kubectl -n zabbix get pods -o wide
            kubectl -n zabbix get pvc
            kubectl -n zabbix describe pods
            kubectl -n zabbix get events --sort-by=.lastTimestamp | tail -50
            echo "::endgroup::"
          fi
          exit $rc

      - name: Endereco do Zabbix Server (NLB) e acesso
        if: ${{ always() }}
        run: |
          echo "Aguardando o NLB interno do trapper (10051)..."
          NLB=""
          for i in $(seq 1 30); do
            NLB=$(kubectl -n zabbix get svc zabbix-server -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            [ -n "$NLB" ] && break
            sleep 10
          done
          {
            echo "## Zabbix Server (Stage 2)"
            echo ""
            echo "- **zabbix_server_address (para o Proxy):** \`${NLB:-<provisionando; veja o comando abaixo>}\`"
            echo "  - porta trapper \`10051\` (NLB interno, alcancavel pelas EC2s na VPC)"
            echo '  ```bash'
            echo "  kubectl -n zabbix get svc zabbix-server -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'; echo"
            echo '  ```'
            echo "- **UI web:** port-forward e acesse <http://localhost:8888> (login \`Admin\` / \`zabbix\`)"
            echo '  ```bash'
            echo "  kubectl -n zabbix port-forward svc/zabbix-web 8888:80"
            echo '  ```'
            echo "- Informe o endereco do NLB como \`zabbix_server_address\` no Job Template do Proxy (AWX)."
          } >> "$GITHUB_STEP_SUMMARY"
